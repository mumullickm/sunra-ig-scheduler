name: Sunra Reels publish

# Reel to IG + FB daily at 21:00 BD (15:00 UTC). Self-heals.
on:
  schedule:
    - cron: '5 15 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sunra-publisher
  cancel-in-progress: false

jobs:
  publish-reels:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Publish due reels (IG + FB)
        env:
          META_PAGE_TOKEN: ${{ secrets.META_PAGE_TOKEN }}
        run: python3 run_reels.py
      - name: Commit updated state
        run: |
          git config user.name "sunra-bot"
          git config user.email "sunra-bot@users.noreply.github.com"
          git add posted_reels.json
          git diff --staged --quiet && { echo "no state change to push"; exit 0; }
          git commit -m "state: update posted reels [skip ci]"
          for i in 1 2 3 4 5; do
            if git pull --rebase --autostash origin main && git push; then
              echo "state pushed on attempt $i"; exit 0
            fi
            echo "push attempt $i lost a race, retrying..."; sleep $((RANDOM % 4 + 2))
          done
          echo "::error::failed to push posted_reels.json after 5 attempts"; exit 1
